<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maxpat Renderer</title>
    <style>
        body {
            font-family: monospace;
            margin: 0;
            padding: 20px;
            background-color: #2b2b2b;
            color: #d4d4d4;
        }
        #controls {
            margin-bottom: 20px;
        }
        #viewport {
            width: 100%;
            height: 85vh;
            overflow: auto;
            border: 1px solid #444;
            background-color: #1e1e1e;
            position: relative;
        }
        #patcher-container {
            position: relative;
            transform-origin: top left;
        }
        .max-box {
            position: absolute;
            background-color: #333;
            border: 1px solid #666;
            box-sizing: border-box;
            padding: 4px;
            font-size: 11px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            color: #ccc;
        }
        #patchline-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .patchline {
            stroke: #888;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
        }
        .added { border-color: #4caf50 !important; color: #4caf50 !important; }
        .removed { border-color: #f44336 !important; color: #f44336 !important; opacity: 0.6; stroke-dasharray: 5, 5; }
        .modified { border-color: #ff9800 !important; color: #ff9800 !important; }
        .patchline.added { stroke: #4caf50 !important; }
        .patchline.removed { stroke: #f44336 !important; stroke-dasharray: 5, 5; }
        .moved { border-color: #2196f3 !important; color: #2196f3 !important; border-style: dashed !important; }
    </style>
</head>
<body>
    <div id="controls">
        <label>Old: <input type="file" id="fileInputA" accept=".maxpat"></label>
        <label>New: <input type="file" id="fileInputB" accept=".maxpat"></label>
    <div id="view-toggles" style="display: none;">
        <label><input type="radio" name="view" value="before"> Before</label>
        <label><input type="radio" name="view" value="after"> After</label>
        <label><input type="radio" name="view" value="diff" checked> Diff</label>
    </div>
    </div>
    <div id="viewport">
        <div id="patcher-container">
            <svg id="patchline-svg"></svg>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
