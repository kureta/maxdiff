<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Maxpat Renderer</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
<div id="controls">
    <div id="file-inputs">
        <label>Old: <input accept=".maxpat" id="fileInputA" type="file"></label>
        <label>New: <input accept=".maxpat" id="fileInputB" type="file"></label>
    </div>
    <div id="view-toggles" style="display: none;">
        <label><input name="view" type="radio" value="before"> Before</label>
        <label><input name="view" type="radio" value="after"> After</label>
        <label><input checked name="view" type="radio" value="diff"> Diff</label>
    </div>
    <div id="zoom-controls">
        <button id="btn-zoom-out">-</button>
        <button id="btn-zoom-reset">100%</button>
        <button id="btn-zoom-in">+</button>
    </div>
    <button id="btn-reset-layout">Reset Layout</button>
    <button id="btn-metadata" style="display: none;">Metadata Changes</button>
</div>
<div id="viewport">
    <div id="patcher-wrapper">
        <div id="patcher-container">
            <svg id="patchline-svg"></svg>
        </div>
    </div>
</div>

<div class="modal" id="details-modal" style="display: none;">
    <div class="modal-content">
        <span class="close-button">&times;</span>
        <h3>Attribute Changes</h3>
        <div id="diff-content"></div>
    </div>
</div>

<div class="sidebar" id="metadata-sidebar">
    <div class="sidebar-header">
        <h3>Patch Metadata Changes</h3>
        <button id="btn-close-sidebar">&times;</button>
    </div>
    <div id="metadata-content"></div>
</div>

<script src="app.js"></script>
</body>
</html>
