<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Maxpat Diff</title>
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <div id="toolbar">
      <div class="tb-left">
        <button id="btn-back" hidden>‹ Back</button>
        <div id="file-inputs">
          <label>Old <input accept=".maxpat,.amxd" id="fileInputA" type="file" /></label>
          <label>New <input accept=".maxpat,.amxd" id="fileInputB" type="file" /></label>
        </div>
        <span id="filename-display"></span>
      </div>

      <div class="tb-center">
        <div id="view-toggles" hidden>
          <label><input name="view" type="radio" value="before" />Before</label>
          <label><input name="view" type="radio" value="after" />After</label>
          <label><input checked name="view" type="radio" value="diff" />Diff</label>
        </div>
      </div>

      <div class="tb-right">
        <label class="tb-toggle">
          <input id="presentation-toggle" type="checkbox" />
          <span>Present</span>
        </label>
        <label class="tb-toggle" id="show-removed-container" hidden>
          <input id="show-removed-toggle" type="checkbox" />
          <span>Show removed</span>
        </label>
        <div class="tb-sep"></div>
        <div id="zoom-controls">
          <button id="btn-zoom-out">−</button>
          <button id="btn-zoom-reset">100%</button>
          <button id="btn-zoom-in">+</button>
        </div>
        <div class="tb-sep"></div>
        <button id="btn-reset-layout">↺ Reset</button>
        <button id="btn-metadata" hidden>Metadata</button>
        <button id="btn-git-history" hidden>History</button>
      </div>
    </div>

    <div id="viewport">
      <div id="patcher-wrapper">
        <max-patcher id="patcher"></max-patcher>
      </div>
    </div>

    <div id="git-panel">
      <div class="panel-header">
        <span>Git History</span>
        <button id="btn-close-git">×</button>
      </div>
      <div class="panel-body">
        <div class="commit-row">
          <span class="commit-label">Before</span>
          <button id="btn-before-prev">‹</button>
          <select id="select-before"></select>
          <button id="btn-before-next">›</button>
        </div>
        <div class="step-row">
          <button id="btn-git-prev">‹‹ Step</button>
          <button id="btn-git-next">Step ››</button>
        </div>
        <div class="commit-row">
          <span class="commit-label">After</span>
          <button id="btn-after-prev">‹</button>
          <select id="select-after"></select>
          <button id="btn-after-next">›</button>
        </div>
      </div>
    </div>

    <div class="modal" id="details-modal">
      <div class="modal-content">
        <span class="close-button" id="btn-close-modal">&times;</span>
        <h3>Attribute Changes</h3>
        <div id="diff-content"></div>
      </div>
    </div>

    <div class="sidebar" id="metadata-sidebar">
      <div class="sidebar-header">
        <h3>Patch Metadata</h3>
        <button id="btn-close-sidebar">&times;</button>
      </div>
      <div id="metadata-content"></div>
    </div>

    <script src="src/app.js" type="module"></script>
  </body>
</html>
