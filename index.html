<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maxpat Renderer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="controls">
        <div id="file-inputs">
            <label>Old: <input type="file" id="fileInputA" accept=".maxpat"></label>
            <label>New: <input type="file" id="fileInputB" accept=".maxpat"></label>
        </div>
        <div id="view-toggles" style="display: none;">
            <label><input type="radio" name="view" value="before"> Before</label>
            <label><input type="radio" name="view" value="after"> After</label>
            <label><input type="radio" name="view" value="diff" checked> Diff</label>
        </div>
    </div>
    <div id="viewport">
        <div id="patcher-container">
            <svg id="patchline-svg"></svg>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
